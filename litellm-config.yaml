model_list:
  - model_name: qwen3-coder-30b
    litellm_params:
      model: openai/qwen3-coder-30b-instruct
      api_base: http://vllm-coder:8000/v1
      api_key: "dummy"          # vLLM ignores this, field is required
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 32768
      supports_function_calling: true
      supports_tool_choice: true

litellm_settings:
  # Forward every request/response to Langfuse for per-student review
  success_callback: ["langfuse"]
  # Pre-call hook: stamp the OpenAI `user` field from the virtual key's user_id
  # so coding-harness (API-key) traffic is attributed in Langfuse, not just
  # Open WebUI chats. See litellm_hooks.py.
  callbacks: litellm_hooks.inject_user_instance

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # Map the student identity Open WebUI forwards (ENABLE_FORWARD_USER_INFO_HEADERS)
  # to the LiteLLM end-user, which becomes the Langfuse trace user_id.
  user_header_mappings:
    - header_name: X-OpenWebUI-User-Email
      litellm_user_role: customer
