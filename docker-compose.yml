services:
  vllm-coder:
    image: nvcr.io/nvidia/vllm:25.09-py3
    ipc: host
    ports: ["8001:8000"]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    command: >
      vllm serve Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      --served-model-name qwen3-coder-30b-instruct
      --gpu-memory-utilization 0.85
      --max-model-len 131072
      --max-num-seqs 16
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${LITELLM_PG_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - litellm-pg:/var/lib/postgresql/data
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    depends_on: [vllm-coder, postgres]
    ports: ["4000:4000"]
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
      - ./litellm_hooks.py:/app/litellm_hooks.py
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - default
      - llmnet
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:${LITELLM_PG_PASSWORD}@postgres:5432/litellm
      # Ship traces to the self-hosted Langfuse stack over the shared network
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on: [litellm]
    ports: ["3000:8080"]
    volumes:
      - open-webui:/app/backend/data
    environment:
      # Point Open WebUI at the LiteLLM proxy (internal network, OpenAI-compatible)
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      # We only use the LiteLLM/OpenAI endpoint, not Ollama
      - ENABLE_OLLAMA_API=False
      # Lock down public registration now that the admin account exists
      - ENABLE_SIGNUP=False
      # Forward the logged-in user's identity to LiteLLM as
      # X-OpenWebUI-User-{Id,Email,Name} headers for per-user logging
      - ENABLE_FORWARD_USER_INFO_HEADERS=True
    restart: unless-stopped

networks:
  # Shared with the Langfuse stack (docker-compose.langfuse.yml).
  # Create once with:  docker network create llmnet
  llmnet:
    external: true

volumes:
  litellm-pg:
  open-webui:
